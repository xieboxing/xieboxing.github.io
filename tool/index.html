<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>创造AI | 免费实用工具箱</title>

    <meta name="title" content="产品经理 | 创造AI">
    <meta name="description" content="产品经理大星的个人主页, 专注数据驱动与AI赋能">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://code.jquery.com/jquery-3.6.4.min.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: #f8fafc;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 40px 20px;
            position: relative;
            overflow-x: hidden;
        }

        .bg-grid {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image:
                linear-gradient(rgba(6, 182, 212, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(6, 182, 212, 0.05) 1px, transparent 1px);
            background-size: 50px 50px;
            z-index: -1;
        }

        .container {
            max-width: 1200px;
            width: 100%;
            margin: 0 auto;
            text-align: center;
            z-index: 1;
        }

        .header {
            margin-bottom: 30px;
        }

        .title {
            font-size: 2.8rem;
            font-weight: 700;
            /* 融入副标题的核心青色#00f0ff，增强呼应 */
            background: linear-gradient(90deg, #06b6d4, #00f0ff, #06b6d4);
            background-size: 200% auto;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            /* 动画时长稍长于副标题（4s），形成节奏差 */
            animation: gradient 4s ease infinite;
            text-shadow: 0 0 20px rgba(0, 240, 255, 0.4);
        }

        /* 副标题样式 - 新增自动字体流光特效 */
        .subtitle {
            font-size: 1.1rem;
            margin-top: 15px; /* 新增：标题和副标题的间距，可根据需求调整数值（如20px/25px） */
            margin-bottom: 25px;
            letter-spacing: 1px;
            /* 字体流光渐变 */
            background: linear-gradient(90deg, #00f0ff, #a020f0, #0080ff, #00f0ff);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            /* 自动循环动画 */
            animation: rainbowText 3s linear infinite;
            /* 文字发光增强效果 */
            text-shadow: 0 0 8px rgba(0, 240, 255, 0.4);
        }

        /* 搜索容器样式 */
        .search-container {
            max-width: 500px;
            margin: 0 auto 40px;
            position: relative;
        }

        .search-input {
            width: 100%;
            padding: 12px 20px 12px 45px;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(6, 182, 212, 0.3);
            border-radius: 30px;
            color: #f8fafc;
            font-size: 1rem;
            outline: none;
            transition: all 0.3s ease;
            backdrop-filter: blur(5px);
        }

        .search-input:focus {
            border-color: #06b6d4;
            box-shadow: 0 0 15px rgba(6, 182, 212, 0.4);
            background: rgba(15, 23, 42, 0.8);
        }

        .search-icon {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: #94a3b8;
        }

        .search-input:focus + .search-icon {
            color: #06b6d4;
        }

        .content-box {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(6, 182, 212, 0.15);
            border-radius: 20px;
            padding: 30px;
            min-height: 400px;
        }

        .tools-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 15px;
        }

        /* 工具卡片样式 - 替换为流光边框特效 */
        .tool-card {
            background: linear-gradient(145deg, rgba(30, 41, 59, 0.7), rgba(15, 23, 42, 0.8));
            border-radius: 12px;
            padding: 20px 12px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 80px;
            /* 关键：为伪元素预留空间 */
            background-clip: padding-box;
            border: 1px solid transparent; /* 占位边框 */
            overflow: visible;
        }

        /* 流光边框伪元素 - 核心特效 */
        .tool-card::after {
            content: '';
            position: absolute;
            top: -3px;
            left: -3px;
            right: -3px;
            bottom: -3px;
            border-radius: calc(12px + 3px);
            background-image: linear-gradient(45deg, #00f0ff, #0080ff, #a020f0, #00f0ff);
            background-size: 300% 300%;
            z-index: -1;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            /* 只显示边框区域 */
            -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
            -webkit-mask-composite: xor;
            mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
            mask-composite: exclude;
            padding: 3px;
        }

        /* 卡片hover效果 - 显示流光边框 + 轻微上浮 */
        .tool-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
        }

        /* hover时激活流光动画 */
        .tool-card:hover::after {
            opacity: 1;
            animation: rainbowBorder 2s linear infinite;
        }

        .tool-name {
            font-size: 0.95rem;
            font-weight: 500;
            color: #e2e8f0;
            line-height: 1.3;
        }

        .third-party-badge {
            position: absolute;
            top: 6px;
            right: 6px;
            color: #06b6d4;
            font-size: 0.75rem;
            background: rgba(6, 182, 212, 0.1);
            width: 20px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            border: 1px solid rgba(6, 182, 212, 0.2);
        }

        .empty-state {
            grid-column: 1 / -1;
            padding: 60px;
            color: #64748b;
        }

        footer {
            margin-top: 40px;
            padding-bottom: 20px;
            font-size: 0.9rem;
            color: #64748b;
        }

        /* 原有渐变动画 */
        @keyframes gradient {
            0% { background-position: 0% center; }
            50% { background-position: 100% center; }
            100% { background-position: 0% center; }
        }

        /* 新增：字体流光动画 */
        @keyframes rainbowText {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* 新增：边框流光动画 */
        @keyframes rainbowBorder {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        @media (max-width: 480px) {
            .title { font-size: 1.8rem; }
            .subtitle { font-size: 0.9rem; }
            .tools-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
            .tool-card { min-height: 70px; padding: 15px 10px; }
            .tool-name { font-size: 0.85rem; }
        }
    </style>

</head>
<body>
    <div class="bg-grid"></div>

    <div class="container">
        <header class="header">
            <h1 class="title">大星精选免费工具</h1>
            <p class="subtitle">AI创造 | 精选收集 | 免费使用</p>
            
            <div class="search-container">
                <input type="text" id="toolSearch" class="search-input" placeholder="输入关键字查找工具...">
                <i class="fas fa-search search-icon"></i>
            </div>
        </header>

        <main class="content-box">
            <div id="tools-container" class="tools-grid">
                </div>
        </main>

        <footer class="footer">
            <p>创造AI | 共 <span id="tool-count">0</span> 个实用工具</p>
        </footer>
    </div>

    <script>
        const toolFiles = [
            { name: 'Unix时间戳转换工具', file: 'Unix时间戳转换工具.html' },
            { name: '正则表达式测试', file: '正则表达式测试.html' },
            { name: '在线解析JSON', file: '在线解析JSON.html' },
            { name: '字符串长度计算', file: '字符串长度在线计算.html' },
            { name: '进制转换工具', file: '进制转换工具.html' },

            { name: 'URL编码解码', file: 'URL编码解码.html' },
            { name: 'JWT加密解密', file: 'JWT加密解密.html' },
            { name: 'Base64加密解密', file: 'Base64加密解密.html' },
            { name: 'MD5加密工具', file: 'MD5加密.html' },
            { name: 'SHA加密工具', file: 'SHA加密.html' },

            { name: '文档格式转换(含PDF)', file: 'https://tools.pdf24.org/zh/all-tools', type: "三方" },
            { name: '二维码生成/解码', file: 'https://cli.im/', type: "三方" },
            { name: 'IP信息查询', file: 'https://www.ip.cn/', type: "三方" },
            { name: '临时邮箱', file: 'https://maildrop.cc/', type: "三方" },
            { name: '科学计算器', file: './科学计算器/index.html' },
            
            { name: 'UUID生成器', file: 'UUID生成器.html' },
            { name: '图片压缩工具', file: '图片压缩工具.html' },
        ];

        $(document).ready(function() {
            renderTools(toolFiles);

            // 实时搜索逻辑
            $('#toolSearch').on('input', function() {
                const keyword = $(this).val().toLowerCase().trim();
                let visibleCount = 0;
                
                $('.tool-card').each(function() {
                    const name = $(this).find('.tool-name').text().toLowerCase();
                    if (name.includes(keyword)) {
                        $(this).show();
                        visibleCount++;
                    } else {
                        $(this).hide();
                    }
                });

                if (visibleCount === 0) {
                    if ($('#empty-msg').length === 0) {
                        $('#tools-container').append('<div id="empty-msg" class="empty-state">未找到匹配的工具</div>');
                    }
                } else {
                    $('#empty-msg').remove();
                }
            });
        });

        function renderTools(tools) {
            const container = $('#tools-container');
            container.empty();

            tools.forEach(tool => {
                const badgeHtml = tool.type === "三方" 
                    ? '<div class="third-party-badge" title="三方协作"><i class="fas fa-handshake"></i></div>' 
                    : '';

                const toolCard = $(`
                    <div class="tool-card">
                        ${badgeHtml}
                        <span class="tool-name">${tool.name}</span>
                    </div>
                `);

                toolCard.click(function() {
                    window.open(tool.file, '_blank');
                    $(this).css('transform', 'scale(0.95)');
                    setTimeout(() => $(this).css('transform', ''), 150);
                });

                container.append(toolCard);
            });

            $('#tool-count').text(tools.length);
        }
    </script>
</body>
</html>
