<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>在线进制转换 - OSCHINA.NET</title>
    <!-- <script src="https://cdn.jsdelivr.net/npm/jquery@3.5.1/dist/jquery.min.js"></script> -->
    <script src="https://cdn.bootcdn.net/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
    <style>
        /* 全局样式重置 */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: #fff;
            color: #333;
            line-height: 1.6;
            padding-bottom: 60px; /* 为页脚留空 */
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
        }

        /* 标题部分 */
        h1 {
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 5px;
            text-align: left;
        }
        .subtitle {
            font-size: 14px;
            color: #666;
            margin-bottom: 25px;
            text-align: left;
        }

        /* 模块行布局 */
        .section-row {
            display: flex;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .label-text {
            width: 80px;
            font-weight: bold;
            font-size: 15px;
        }

        /* 单选按钮组 */
        .radio-group {
            display: flex;
            align-items: center;
            margin-right: 15px;
            flex-wrap: wrap;
        }
        .radio-item {
            display: flex;
            align-items: center;
            margin-right: 12px;
            cursor: pointer;
            font-size: 14px;
            white-space: nowrap;
            margin-top: 5px;
            margin-bottom: 5px;
        }
        .radio-item input { margin-right: 4px; cursor: pointer; }

        /* 输入框与下拉框 */
        select, input[type="text"] {
            padding: 8px 12px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }
        select:focus, input[type="text"]:focus {
            border-color: #007bff;
            box-shadow: 0 0 0 2px rgba(0,123,255,0.1);
        }
        .flex-input-wrapper {
            flex: 1;
            display: flex;
            gap: 10px;
            min-width: 300px;
        }
        .full-width-input { flex: 1; width: 100%; }

        /* 复制按钮 */
        .copy-btn {
            padding: 8px 15px;
            background-color: #f8f9fa;
            border: 1px solid #ccc;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            white-space: nowrap;
        }
        .copy-btn:hover { background-color: #e2e6ea; }

        /* 页脚 */
        footer {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background-color: #f5f5f5;
            padding: 12px 10px;
            text-align: center;
            font-size: 12px;
            color: #888;
            border-top: 1px solid #ddd;
        }

        /* Toast 提示 */
        #toast {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 10px 20px;
            border-radius: 5px;
            display: none;
            z-index: 1000;
        }

        /* 响应式适配 */
        @media (max-width: 768px) {
            .section-row { flex-direction: column; align-items: flex-start; }
            .label-text { margin-bottom: 8px; width: 100%; }
            .radio-group { margin-right: 0; margin-bottom: 10px; width: 100%; }
            .flex-input-wrapper { width: 100%; min-width: auto; }
            h1 { font-size: 22px; }
            footer { position: relative; margin-top: 30px; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>在线进制转换</h1>
    <p class="subtitle">支持在2~36进制之间进行任意转换，支持浮点型</p>

    <div class="section-row">
        <span class="label-text">源进制</span>
        <div class="radio-group" id="src-radio-group">
            <label class="radio-item"><input type="radio" name="src_base" value="2">2进制</label>
            <label class="radio-item"><input type="radio" name="src_base" value="4">4进制</label>
            <label class="radio-item"><input type="radio" name="src_base" value="8">8进制</label>
            <label class="radio-item"><input type="radio" name="src_base" value="10" checked>10进制</label>
            <label class="radio-item"><input type="radio" name="src_base" value="16">16进制</label>
            <label class="radio-item"><input type="radio" name="src_base" value="32">32进制</label>
        </div>
        <select id="src-base-select"></select>
    </div>

    <div class="section-row">
        <span class="label-text">转换数字</span>
        <div class="flex-input-wrapper">
            <input type="text" id="input-num" class="full-width-input" placeholder="在此输入待转换数字" spellcheck="false">
        </div>
    </div>

    <div class="section-row">
        <span class="label-text">目标进制</span>
        <div class="radio-group" id="dst-radio-group">
            <label class="radio-item"><input type="radio" name="dst_base" value="2">2进制</label>
            <label class="radio-item"><input type="radio" name="dst_base" value="4">4进制</label>
            <label class="radio-item"><input type="radio" name="dst_base" value="8">8进制</label>
            <label class="radio-item"><input type="radio" name="dst_base" value="10">10进制</label>
            <label class="radio-item"><input type="radio" name="dst_base" value="16" checked>16进制</label>
            <label class="radio-item"><input type="radio" name="dst_base" value="32">32进制</label>
        </div>
        <select id="dst-base-select"></select>
    </div>

    <div class="section-row">
        <span class="label-text">转换结果</span>
        <div class="flex-input-wrapper">
            <input type="text" id="output-num" class="full-width-input" value="转换结果" readonly>
            <button class="copy-btn" id="btn-copy">复制结果</button>
        </div>
    </div>
</div>

<div id="toast"></div>

<footer>
     <p>创造 AI | Copyright ©2020-2026</p>
</footer>

<script>
$(document).ready(function() {
    const $srcSelect = $('#src-base-select');
    const $dstSelect = $('#dst-base-select');
    const $inputNum = $('#input-num');
    const $outputNum = $('#output-num');
    const presetBases = ['2', '4', '8', '10', '16', '32'];

    // 1. 初始化下拉列表 (2-36)
    for (let i = 2; i <= 36; i++) {
        $srcSelect.append(`<option value="${i}">${i}进制</option>`);
        $dstSelect.append(`<option value="${i}">${i}进制</option>`);
    }
    $srcSelect.val('10');
    $dstSelect.val('16');

    // 2. 双向联动逻辑
    function syncBase(type, value) {
        const $radios = $(`input[name="${type}_base"]`);
        const $select = $(`#${type}-base-select`);
        
        // 同步下拉框
        $select.val(value);
        
        // 同步单选框
        $radios.prop('checked', false);
        if (presetBases.includes(value.toString())) {
            $radios.filter(`[value="${value}"]`).prop('checked', true);
        }
        convert();
    }

    $('input[name="src_base"]').change(function() { syncBase('src', $(this).val()); });
    $srcSelect.change(function() { syncBase('src', $(this).val()); });
    $('input[name="dst_base"]').change(function() { syncBase('dst', $(this).val()); });
    $dstSelect.change(function() { syncBase('dst', $(this).val()); });

    // 3. 核心转换逻辑 (支持浮点数)
    function convert() {
        const val = $inputNum.val().trim();
        if (!val) {
            $outputNum.val('转换结果');
            return;
        }

        const srcBase = parseInt($srcSelect.val());
        const dstBase = parseInt($dstSelect.val());

        // 校验输入合法性
        const validChars = "0123456789abcdefghijklmnopqrstuvwxyz".substring(0, srcBase);
        const regex = new RegExp(`^[${validChars}.]+$`, 'i');
        
        if (!regex.test(val) || (val.split('.').length > 2)) {
            showToast(`请输入合法的 ${srcBase} 进制数字`);
            return;
        }

        try {
            const parts = val.split('.');
            // 整数部分转换
            let decimalInt = parseInt(parts[0], srcBase);
            let resultInt = decimalInt.toString(dstBase).toUpperCase();

            // 小数部分转换
            if (parts.length === 2) {
                let fractionStr = parts[1];
                let decimalFrac = 0;
                for (let i = 0; i < fractionStr.length; i++) {
                    let digit = parseInt(fractionStr[i], srcBase);
                    decimalFrac += digit / Math.pow(srcBase, i + 1);
                }

                // 将十进制小数转为目标进制
                let resultFrac = "";
                let precision = 12; // 限制精度避免死循环
                while (decimalFrac > 0 && precision > 0) {
                    decimalFrac *= dstBase;
                    let digit = Math.floor(decimalFrac);
                    resultFrac += digit.toString(dstBase).toUpperCase();
                    decimalFrac -= digit;
                    precision--;
                }
                $outputNum.val(resultInt + "." + resultFrac);
            } else {
                $outputNum.val(resultInt);
            }
        } catch (e) {
            showToast("转换出错，请检查输入");
        }
    }

    // 4. 事件监听
    $inputNum.on('input', convert);

    // 5. 辅助功能：点击全选
    $outputNum.click(function() {
        if (this.value !== '转换结果') {
            this.select();
        }
    });

    // 6. 复制功能
    $('#btn-copy').click(function() {
        const text = $outputNum.val();
        if (text === '转换结果' || !text) return;
        
        const tempInput = $("<input>");
        $("body").append(tempInput);
        tempInput.val(text).select();
        try {
            document.execCommand("copy");
            showToast("复制成功");
        } catch (err) {
            showToast("复制失败");
        }
        tempInput.remove();
    });

    // 7. Toast 提示
    function showToast(msg) {
        const $t = $('#toast');
        $t.text(msg).fadeIn();
        setTimeout(() => { $t.fadeOut(); }, 2000);
    }
});
</script>

</body>
</html>
