<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- 禁用浏览器缓存 -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>创造 AI 客服</title>
    <!-- 引入自定义样式 -->
    <link rel="stylesheet" href="style.css?v=20260315">
    <script src="sensitiveWord.js?v=202603172"></script>
     <!-- 引入 jQuery（指定CDN） -->
    <!-- <script src="https://cdn.jsdelivr.net/npm/jquery@3.5.1/dist/jquery.min.js"></script> -->
    <script src="https://cdn.bootcdn.net/ajax/libs/jquery/3.5.1/jquery.min.js"></script>


</head>

<body>
    <!-- 顶部标题区 -->
    <header class="header">
        <h1 class="main-title">创造 AI 客服</h1>
        <p class="sub-title">帮助客户快速了解金融交易平台，支持客户数据查询与平台相关操作</p>
    </header>

    <!-- 主容器 -->
    <main class="main-container">
        <!-- 左侧：客服聊天框模块 -->
        <section class="chat-section">
            <h2 class="section-title">客服聊天框</h2>
            <!-- 消息展示区 -->
            <div class="messages-container" id="messagesContainer">
                <!-- 默认机器人欢迎消息 -->
                <div class="message bot-message">
                    <div class="avatar bot-avatar">
                        <span class="avatar-icon">AI</span>
                    </div>
                    <div class="message-bubble bot-bubble">您好，有什么可以帮您？</div>
                </div>
            </div>
            <!-- 加载状态区（模板，用于克隆） -->
            <div class="loading-container" id="loadingContainer" style="display: none;">
                <div class="loading-content">
                    <div class="loading-dots">
                        <div class="loading-dot dot-1"></div>
                        <div class="loading-dot dot-2"></div>
                        <div class="loading-dot dot-3"></div>
                    </div>
                    <div class="loading-text" id="loadingText">创造 AI 客服正在思考中...</div>
                </div>
            </div>
            <!-- 快速问题引导按钮区（新增功能） -->
            <div class="quick-guide-container" id="quickGuideContainer">
                <div class="quick-guide-btn" data-text="你是谁 能做什么">你是谁 能做什么</div>
                <div class="quick-guide-btn" data-text="帮我推荐高收益的交易品种。">帮我推荐高收益的交易品种。</div>
                <div class="quick-guide-btn" data-text="如何进行入金/充值">如何进行入金/充值</div>
            </div>
            <!-- 底部输入区 -->
            <div class="input-container">
                <textarea class="chat-input" id="chatInput" placeholder="请输入" rows="2"></textarea>
                <!-- 字符计数展示：固定在输入框右下角，实时显示当前字符数/100 -->
                <span class="char-count-display" id="charCountDisplay"></span>
                <button class="send-btn" id="sendBtn">发送</button>
            </div>
        </section>

        <!-- 右侧：配置与日志模块 -->
        <section class="config-section">
            <!-- Token 输入框 -->
            <div class="config-item token-box">
                <h3 class="config-title">校验token 输入框</h3>
                <input type="text" class="token-input" id="tokenInput" placeholder="请输入 Coze API token">
            </div>
            <!-- 前端操作日志 -->
            <div class="config-item log-box">
                <h3 class="config-title">前端操作日志</h3>
                <div class="logs-container" id="logsContainer"></div>
            </div>
            <!-- 自动测评模块 -->
            <div class="config-item evaluation-box">
                <h3 class="config-title">自动测评</h3>
                <!-- 第一行：自动测评按钮 + 同时测评数下拉框 -->
                <div class="evaluation-row">
                    <button class="evaluation-btn" id="evaluationBtn">自动测评</button>
                    <select class="concurrency-select" id="concurrencySelect">
                        <option value="1">同时测1个</option>
                        <option value="3">同时测3个</option>
                        <option value="5">同时测5个</option>
                    </select>
                </div>
                <!-- 第二行：下载测评结果按钮 -->
                <div class="evaluation-row">
                    <button class="download-btn" id="downloadBtn">下载测评结果</button>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <p class="footer-notice">当前开发进度约 70%，工具查询与交易功能仍在持续优化。为节省资源，暂不支持闲聊功能。</p>
        <p>创造 AI | Copyright ©2026</p>
    </footer>

    <!-- 为了节省后端资源，暂时引入敏感词过滤模块 -->
    <script src="sensitiveFilter.js"></script>
    <!-- 引入测评问题列表 -->
    <script src="evaluation.js"></script>
    <!-- 引入自定义 JS -->
    <script src="main.js?v=20260315"></script>
</body>
</html>
