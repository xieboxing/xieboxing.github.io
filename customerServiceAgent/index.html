<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>创造 AI 客服 Agent</title>
    <!-- 引入 Font Awesome 图标库（指定CDN） -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css">
    <!-- 引入自定义样式 -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- 顶部标题区 -->
    <header class="header">
        <h1 class="main-title">创造 AI 客服 Agent</h1>
        <p class="sub-title">帮助客户快速了解金融交易平台</p>
    </header>

    <!-- 主容器 -->
    <main class="main-container">
        <!-- 左侧：客服聊天框模块 -->
        <section class="chat-section">
            <h2 class="section-title">客服聊天框</h2>
            <!-- 消息展示区 -->
            <div class="messages-container" id="messagesContainer">
                <!-- 默认机器人欢迎消息 -->
                <div class="message bot-message">
                    <div class="avatar bot-avatar">
                        <i class="fas fa-robot"></i>
                    </div>
                    <div class="message-bubble bot-bubble">
                        您好，有什么可以帮您？
                    </div>
                </div>
            </div>
            <!-- 加载状态区 -->
            <div class="loading-container" id="loadingContainer" style="display: none;">
                <div class="loading-text" id="loadingText">创造 AI 客服正在思考中...</div>
            </div>
            <!-- 底部输入区 -->
            <div class="input-container">
                <textarea class="chat-input" id="chatInput" placeholder="请输入" rows="2"></textarea>
                <button class="send-btn" id="sendBtn">发送</button>
            </div>
        </section>

        <!-- 右侧：配置与日志模块 -->
        <section class="config-section">
            <!-- Token 输入框 -->
            <div class="config-item token-box">
                <h3 class="config-title">token 输入框</h3>
                <input type="text" class="token-input" id="tokenInput" placeholder="请输入 Coze API token">
            </div>
            <!-- 前端操作日志 -->
            <div class="config-item log-box">
                <h3 class="config-title">前端操作日志</h3>
                <div class="logs-container" id="logsContainer"></div>
            </div>
        </section>
    </main>

    <!-- 引入 jQuery（指定CDN） -->
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.5.1/dist/jquery.min.js"></script>
    <!-- 引入自定义 JS -->
    <script src="main.js"></script>
</body>
</html>
